<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="background: #000ff0; width: 500px; height: 100vh; margin: auto; border-radius: 10px;"

    <a href="https://example.com" style="text-decoration: none; display: block;">
  <div style="
    width: 300px;
    padding: 20px;
    background: #f0f0f0;
    border-radius: 10px;
    transition: 0.3s;
  " onmouseover="this.style.background='#e0e0e0'" 
    onmouseout="this.style.background='#f0f0f0'">
    <h3>Заголовок области</h3>
    <p>Вся эта область кликабельна</p>
  </div>
</a>
    
</body>
</html>
